    <script>
      // set theme before first paint to avoid a flash
      try {
        var t =
          localStorage.getItem('theme') ||
          (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.classList.toggle('dark', t === 'dark');
      } catch (e) {}
    </script>
